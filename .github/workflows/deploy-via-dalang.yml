name: Dalang Auth & Exec Test

on:
  workflow_dispatch:  # Allows manual triggering from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (optional, but good practice)
        uses: actions/checkout@v4

      - name: Install Dalang CLI
        run: |
          curl -fsSL https://dalang.io/install.sh | bash
          # Add debug info
          which dalang || echo "dalang binary not found in PATH"
          dalang version || echo "dalang version command failed - install may have issues"

      - name: Restore Dalang credentials from secret
        run: |
          mkdir -p ~/.dalang
          echo '${{ secrets.DALANG_CREDENTIALS }}' > ~/.dalang/credentials
          chmod 600 ~/.dalang/credentials
          ls -l ~/.dalang/credentials  # Confirm file exists and has content

      - name: Debug credentials (non-sensitive)
        run: |
          if [ -s ~/.dalang/credentials ]; then
            echo "Credentials file exists and has content (size: $(stat -c %s ~/.dalang/credentials) bytes)"
            head -c 20 ~/.dalang/credentials | xxd -p  # Hex dump of first 20 bytes (safe, no full token)
          else
            echo "Credentials file is empty or missing!"
          fi

      - name: Validate credentials JSON
        run: |
          if jq . ~/.dalang/credentials > /dev/null 2>&1; then
            echo "Credentials file is valid JSON"
            jq -r '.expires_at' ~/.dalang/credentials  # Safe: just prints expiration timestamp
          else
            echo "Credentials file is INVALID JSON - check quotes around keys!"
            head -n 2 ~/.dalang/credentials  # Shows first 2 lines (may include partial token, but okay for debug)
          fi

      - name: Test Dalang authentication and VPS access
        run: |
          echo "=== Listing all services ==="
          dalang service list --json || echo "→ service list failed (auth or CLI issue?)"

          echo ""
          echo "=== Getting detailed info for your VPS ==="
          dalang service info x6946305a --json | jq . || echo "→ service info failed"

          echo ""
          echo "=== Simple exec test ==="
          dalang exec x6946305a "echo 'Hello from VPS! Time is $(date)' && whoami && pwd" || echo "→ exec failed"

          echo ""
          echo "=== All tests completed ==="

name: Dalang Auth Test

on: workflow_dispatch  # Manual run only for now

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dalang CLI
        run: |
          curl -fsSL https://dalang.io/cli/install.sh | bash
          dalang version || echo "Version check failed"

      - name: Restore credentials
        run: |
          mkdir -p ~/.dalang
          echo "${{ secrets.DALANG_CREDENTIALS }}" > ~/.dalang/credentials
          chmod 600 ~/.dalang/credentials
          ls -l ~/.dalang/credentials  # just to confirm file exists

      - name: Test authentication & VPS access
        run: |
          echo "Listing services..."
          dalang service list --json || echo "List failed - likely auth issue"
          echo ""
          echo "Getting info for your VPS..."
          dalang service info x6946305sa --json | jq . || echo "Info failed"
          echo ""
          echo "Trying a simple exec..."
          dalang exec x6946305sa "echo 'Hello from VPS at $(date)' && whoami" || echo "Exec failed"
